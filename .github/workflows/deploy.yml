# 【全体の仕組み】
# masterにpushされると以下の流れで自動デプロイされる：
#
# master に push
#   ↓
# GitHub Actions が起動（ubuntu マシン）
#   ↓
# flutter build web でDartコードをJavaScript+HTML一式に変換
#   ↓
# weekly_report_app/build/web/ にWebページとして動くファイル一式が生成される
#   ↓
# peaceiris/actions-gh-pages が build/web/ の中身を gh-pages ブランチに push
#   ↓
# GitHub Pages が gh-pages ブランチを配信
#   ↓
# https://vazaluta.github.io/action-organizer/ でアクセス可能
#
# ポイント：flutter build web がWebページとして動く形に変換する責任を持ち
#           GitHub Pages はファイルを配信するだけ。だから不整合が起きない。

name: Deploy Flutter Web to GitHub Pages

# mainブランチにpushされたときだけ実行
on:
  push:
    branches:
      - main

# gh-pagesブランチへの書き込み権限を付与
permissions:
  contents: write

jobs:
  build-and-deploy:
    # GitHubが用意したUbuntuマシン上で実行
    runs-on: ubuntu-latest
    steps:
      # リポジトリのコードをマシンにダウンロード
      - uses: actions/checkout@v4

      # Flutter 3.32.2をインストール
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'

      # Flutterの依存パッケージをインストール
      - name: Install dependencies
        run: flutter pub get
        working-directory: weekly_report_app

      # flutter build web でDartコードをJS+HTML一式に変換
      # --base-href はGitHub PagesのサブパスURLに対応するため必要
      # （これがないとJS/CSSのパスがずれて画面が真っ白になる）
      - name: Build Flutter Web
        run: flutter build web --base-href /action-organizer/
        working-directory: weekly_report_app

      # build/web/ の中身をそのままgh-pagesブランチにpush
      # masterのソースコードは含まれず、ビルド成果物だけが入る
      # GITHUB_TOKENはGitHubが自動発行するので設定不要
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: weekly_report_app/build/web
